<div class="login-wrapper flex align-items-center justify-content-center min-h-screen">
  <p-card styleClass="login-card shadow-6">
    <ng-template pTemplate="header">
      <div class="login-header p-4 pb-0 text-center">
        <i class="pi pi-shield text-primary" style="font-size: 3rem"></i>
        <h2 class="mt-3 mb-1">Gestor de Siniestros</h2>
        <p class="text-color-secondary">Inicia sesión para continuar</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3 p-2">

      <div class="flex flex-column gap-1">
        <label for="username" class="font-medium">Usuario</label>
        <input
          pInputText
          id="username"
          formControlName="username"
          placeholder="Tu usuario"
          [class.ng-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
          class="w-full"
        />
      </div>

      <div class="flex flex-column gap-1">
        <label for="password" class="font-medium">Contraseña</label>
        <p-password
          inputId="password"
          formControlName="password"
          placeholder="Tu contraseña"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>

      <p-message
        *ngIf="errorMsg"
        severity="error"
        [text]="errorMsg"
        styleClass="w-full"
      />

      <p-button
        type="submit"
        label="Iniciar sesión"
        icon="pi pi-sign-in"
        styleClass="w-full mt-2"
        [loading]="loading"
        [disabled]="form.invalid || loading"
      />
    </form>
  </p-card>
</div>
